# Setting type: Single
# Default value: 0
# Acceptable value range: From -45 to 45
ADS Hands Yaw Rotation = 0

## Hands roll rotation (Z-axis) when ADS with 'Reset On ADS' enabled. 0 = default game position
# Setting type: Single
# Default value: 0
# Acceptable value range: From -45 to 45
ADS Hands Roll Rotation = 0

## Hands position forward/backward (Z-axis) when ADS. Default is 0.04
# Setting type: Single
