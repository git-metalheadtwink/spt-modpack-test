ADS Hands Sideways Offset = 0

[Advanced ADS Transitions]

## When enabled, weapon is thrown forward then pushed back when aiming to simulate shouldering
# Setting type: Boolean
# Default value: false
Advanced ADS Transitions = false

## When enabled (requires 'Advanced ADS Transitions'), applies the same shouldering effect when switching between stances
# Setting type: Boolean
# Default value: true
Affect Stance Transition Too = true

## Overall intensity of ADS throw effect. Multiplies Forward, Up, Yaw, Pitch, Roll amounts. 0 = no throw, 1 = use config values, 2 = double effect.
# Setting type: Single
# Default value: 1
# Acceptable value range: From 0 to 2
ADS Shoulder Throw Intensity = 1

## Overall intensity of stance switch throw effect. Multiplies Forward, Up, Yaw, Pitch, Roll amounts. 0 = no throw, 1 = use config values, 2 = double effect.
# Setting type: Single
# Default value: 0.75
# Acceptable value range: From 0 to 2
Stance Shoulder Throw Intensity = 0.75

## When enabled, shouldering speed/duration/amount scales with weapon weight and ergonomics (uses EFT's AimingSpeed calculation). Heavy/low-ergo = slower, dramatic. Light/high-ergo = fast, subtle.
# Setting type: Boolean
# Default value: true
Scale by Weapon Stats = true

## How strongly weapon stats affect ADS shouldering. 0 = no scaling (all weapons same), 1 = normal, 2 = exaggerated difference between light/heavy weapons.
# Setting type: Single
# Default value: 1
# Acceptable value range: From 0 to 2
Advanced ADS Transition Stat Intensity = 1

## How strongly weapon weight/ergonomics affects stance transition speed and shouldering. 0.01 = minimal effect, 1 = normal, 2 = exaggerated. Works when 'Affect Stance Transition Too' is enabled.
# Setting type: Single
# Default value: 1
# Acceptable value range: From 0.01 to 2
Advanced Stance Transition Stat Intensity = 1

## Base forward throw distance. With 'Scale by Weapon Stats' enabled, this is multiplied by inverse AimingSpeed (heavy weapons throw more).
# Setting type: Single
# Default value: 0.02
# Acceptable value range: From 0 to 0.3
Shoulder Throw Forward Amount = 0.02

## Base vertical offset during throw. Negative = down. With 'Scale by Weapon Stats', scales with inverse AimingSpeed.
# Setting type: Single
# Default value: -0.015
# Acceptable value range: From -0.15 to 0.15
Shoulder Throw Up Amount = -0.015

## Yaw rotation during throw phase (degrees). Positive = rotate right. Applied to both ADS and stance transitions.
# Setting type: Single
# Default value: 6
# Acceptable value range: From -15 to 15
Shoulder Throw Yaw = 6

## Pitch rotation during throw phase (degrees). Positive = rotate up. Applied to both ADS and stance transitions.
# Setting type: Single
# Default value: -3
# Acceptable value range: From -15 to 15
Shoulder Throw Pitch = -3

## Roll rotation during throw phase (degrees). Positive = tilt right. Applied to both ADS and stance transitions.
# Setting type: Single
# Default value: -1.5
# Acceptable value range: From -15 to 15
Shoulder Throw Roll = -1.5

## Base speed of throw motion. With 'Scale by Weapon Stats', multiplied by AimingSpeed (light weapons = faster).
# Setting type: Single
# Default value: 2
# Acceptable value range: From 0.5 to 5
Shoulder Throw Speed = 2

## Base speed of settling to ADS. With 'Scale by Weapon Stats', multiplied by AimingSpeed.
# Setting type: Single
# Default value: 1.5
# Acceptable value range: From 0.5 to 5
Shoulder Settle Speed = 1.5

## Base throw phase duration (seconds). With 'Scale by Weapon Stats', heavy weapons have longer duration.
# Setting type: Single
# Default value: 0.15
# Acceptable value range: From 0.01 to 0.5
Shoulder Throw Duration = 0.15

